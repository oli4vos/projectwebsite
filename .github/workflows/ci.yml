name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app registry
        run: npm run generate:apps

      - name: Verify generated files are committed
        run: git diff --exit-code src/lib/app-registry.ts src/lib/app-components.tsx

      - name: Run unit tests
        run: npm run test

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
